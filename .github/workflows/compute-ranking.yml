name: Compute ranking

on:
  push:
    paths:
      - "data/logs/**"
  workflow_dispatch:

jobs:
  compute-ranking:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ranking script
        run: python scripts/compute_ranking.py

      - name: Commit classement.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/classement.json
          git commit -m "Update classement" || echo "No changes"
          git push
